name: Build desktop installers

on:
  push:
    branches:
      - drfccv/electron-local
    tags:
      - "v*"
  pull_request:
    branches:
      - drfccv/electron-local
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm desktop:test

  package:
    name: Package ${{ matrix.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            arch: x64
            builder_args: --win nsis --x64
            artifact_name: lvji-windows-x64
            artifact_paths: |
              release/*.exe
              release/*.exe.blockmap
          - name: macOS Intel
            os: macos-latest
            arch: x64
            builder_args: --mac dmg --x64
            artifact_name: lvji-macos-x64
            artifact_paths: |
              release/*.dmg
              release/*.dmg.blockmap
          - name: macOS Apple Silicon
            os: macos-latest
            arch: arm64
            builder_args: --mac dmg --arm64
            artifact_name: lvji-macos-arm64
            artifact_paths: |
              release/*.dmg
              release/*.dmg.blockmap
          - name: Linux x64
            os: ubuntu-latest
            arch: x64
            builder_args: --linux AppImage deb --x64
            artifact_name: lvji-linux-x64
            artifact_paths: |
              release/*.AppImage
              release/*.deb
              release/*.blockmap
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Rebuild SQLite for Electron
        run: pnpm exec electron-rebuild -f -w better-sqlite3 --arch=${{ matrix.arch }}
      - run: pnpm desktop:build
      - name: Build installer
        run: pnpm exec electron-builder ${{ matrix.builder_args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 14
